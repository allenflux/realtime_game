apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-frontend
  namespace: realtime
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: realtime-frontend
  template:
    metadata:
      labels:
        app: realtime-frontend
    spec:
      containers:
        - name: realtime-frontend
          image: flxu/realtime_game:frontend-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: realtime-config
          env:
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: realtime-config
                  key: TZ
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-frontend
  namespace: realtime
spec:
  selector:
    app: realtime-frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP